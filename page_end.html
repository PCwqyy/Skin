<div id="Dots' Home"></div>
<span id="Cursor"></span>
<script type="module">
function CSSColorToRGB(color)
{
	const tempDiv=document.createElement('div');
	tempDiv.style.color=color;
	document.body.appendChild(tempDiv);
	const computedColor=getComputedStyle(tempDiv).color;
	document.body.removeChild(tempDiv);
	const rgbMatch=computedColor.match(/\d+/g);
	if(rgbMatch&&rgbMatch.length>=3)
		return rgbMatch.slice(0,3).map(Number);
	console.warn('Invalid color format');
}
function Gradient(c1,c2,index)
{
	var cl1=CSSColorToRGB(c1);
	var cl2=CSSColorToRGB(c2);
	for(var i in cl1)
		cl1[i]=cl1[i]*index+cl2[i]*(1-index);
	return `rgb(${cl1[0]},${cl1[1]},${cl1[2]})`;
}
/** @type {HTMLCanvasElement} */
var canvas=document.querySelector('canvas#dots');
var ctx=canvas.getContext('2d');
var Dots=[];
/** @param {Event} e */
function AddDot(e)
	{Dots.push({x:e.clientX,y:e.clientY,t:Date.now()});}
document.addEventListener('mousemove',(e)=>{AddDot(e);})
function Resize()
{
	canvas.width=document.body.clientWidth;
	canvas.height=document.body.clientHeight;
}
Resize();
window.addEventListener('resize',Resize);

const TTL=1000;
function Draw()
{
	if(Dots.length==0)	
	{
		requestAnimationFrame(Draw);
		return;
	}
	var now=Date.now();
	ctx.clearRect(0,0,canvas.width,canvas.height);
	Dots=Dots.filter(dot=>now-dot.t<TTL);
	for(let i of Dots)
	{
		ctx.save();
		ctx.fillStyle=Gradient('#70a9cf','#cc0000',1-(now-i.t)/TTL);
		ctx.globalAlpha=1-(now-i.t)/TTL;
		ctx.beginPath();
		ctx.arc(i.x,i.y,2.5,0,Math.PI*2);
		ctx.fill();
		ctx.restore();
	}
	requestAnimationFrame(Draw);
}
Draw();
</script>

<!--Mermaid fix-->
<script>
var MerMargin=10;
function MermaidFix(){
	var MermaidStuffs=document.querySelectorAll('.mermaid>svg>g');
	for(i of MermaidStuffs)
	{
		if(i.children.length==0)
			continue;
		console.log(i);
		var r=i.getBBox();
		var deltaX=0,deltaY=0;
		if(i.classList.contains('block'))
			deltaX=80,deltaY=-90;
		i.parentElement.setAttribute("viewBox",
			`${-MerMargin+deltaX} ${-MerMargin+deltaY} ${r.width+2*MerMargin} ${r.height+2*MerMargin}`);
	}
}
</script>

<!-- PhotoFix -->
<script>
function WarpPhotoInDiv(ele)
{
	var Tar=document.createElement('div');
	Tar.classList.add('PhotoWrap');
	ele.insertAdjacentElement('afterend',Tar);
	ele.remove();
	Tar.appendChild(ele);
	Tar.innerHTML+=`<div class="PhotoAlt">${ele.alt}</div>`;
	Tar.style.width=ele.style.width;
}
function PhotoFix(eles)
{
	for(var ele of eles)
	{
		console.log(ele);
		var alt=ele.getAttribute('alt');
		if(alt==undefined)
			return;
		var res=alt.match(/\{w=([^\}]+)\}/);
		if(res==null)
			continue;
		ele.style.width=res[1];
		ele.setAttribute('alt',alt.substring(res[0].length));
		WarpPhotoInDiv(ele);
	}
}
</script>

<!-- TOC -->
<script>
var TocEle=document.querySelector('.toc');
function TOCfunction()
{
	if(TocEle!=undefined)
	{
		TocEle.classList.add('open');
		var ButtonEle=document.createElement('span');
		TocEle.appendChild(ButtonEle);
		TocEle.addEventListener('mouseenter',()=>{
			TocEle.classList.add('hover');
		});
		TocEle.addEventListener('mouseleave',()=>{
			TocEle.classList.remove('hover');
		});
		setTimeout(()=>{
			TocEle.classList.remove('open');
		},4000);
	}
}
</script>

<!-- Main -->
<script>
function MoveEle(which,toWhere)
{
	var ele=document.querySelector(which);
	if(ele==undefined)
	{
		console.warn(`Element ${which} not found`);
		return;
	}
	ele.remove();
	document.querySelector(toWhere).appendChild(ele);
}
function EnableJS(){
	document.querySelectorAll('js').forEach((e)=>{
		var n=document.createElement('script');
		for(let attr of e.attributes)
			n.setAttribute(attr.name,attr.value);
		n.innerHTML=e.textContent;
		e.remove();
		document.querySelector('#cnblogs_post_body').appendChild(n);
	});
}
function ModifyPage()
{
	setTimeout(()=>{
		var ShowMeButt=document.getElementById('ShowMeButt');
		ShowMeButt.style.display='block';
	},2000);
	MoveEle('#navigator','body');
	MoveEle('.toc','#home');
	MoveEle('#homepage_bottom_pager','#home');
	MoveEle('#homepage_top_pager','#home');
	TOCfunction();
	document.querySelector('div#MockMode').addEventListener('click',()=>{
		document.querySelector('.postBody').classList.toggle('mocked');
	})
}
function OnLoad()
{
	try
	{
		NeoTable(document.querySelectorAll('td'));
		NeoTable(document.querySelectorAll('th'));
		Systree();
		PhotoFix(document.querySelectorAll('#cnblogs_post_body img'));
		MermaidFix();
		Smiles();
		EnableJS();
		hljs.highlightAll();
		hljs.initLineNumbersOnLoad();
		hljs.initLangOnLoad();
		hljs.addActions();
		var LoadingDiv=document.querySelector("#LoadingDiv");
		LoadingDiv.style.animation="LoadingOut 1s"
		setTimeout(()=>{
			LoadingDiv.style.display="none";
		},990);
	}catch(err){
		console.error('[OnLoad]\n',err);
	}
}
window.onload=OnLoad;
try{
	ModifyPage();
}catch(err){
	console.error('[ModifyPage]',err);
}
</script>

<!-- Low Eff Mode -->
<script type="module">
const lowLimit=5,low=30;
var tick=0,last=0,now=0,fps,lowCnt=0;
function CalcFPS()
{
	tick++;
	if(tick>=30)
	{
		now=Date.now();
		fps=Math.round(tick*1000/(now-last));
		if(fps<low){
			lowCnt++;
			console.info(`fps: ${fps}, count: ${lowCnt}ticks under ${low}`);
		}
		if(lowCnt>lowLimit)
		{	
			document.body.setAttribute('LowPerfomance','');
			console.warn(`fps: ${fps} too low, low perf mode on.`);
			return;
		}
		last=now;
		tick=0;
	}
	requestAnimationFrame(CalcFPS);
}
CalcFPS();
</script>
